<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Social Guardian — Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0b0f1a;--surface:#111827;--border:rgba(255,255,255,0.07);--blue:#4f8ef7;--text:#e8eaf2;--muted:#6b7590;--red:#f04a4a;--green:#2ecc71}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding:32px}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
    .container{max-width:520px;margin:0 auto;position:relative;z-index:1}
    .page-title{font-size:22px;font-weight:800;margin-bottom:4px}
    .page-sub{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:28px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
    .card h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:16px;font-family:'DM Mono',monospace}
    .field{margin-bottom:14px}
    .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-family:'DM Mono',monospace}
    .field input{width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;outline:none;transition:border-color 0.2s}
    .field input:focus{border-color:var(--blue)}
    .field input[type=range]{padding:0;height:20px;accent-color:var(--blue)}
    .threshold-val{display:inline-block;font-family:'DM Mono',monospace;font-size:12px;color:var(--blue);margin-left:8px}
    .save-btn{padding:10px 24px;background:linear-gradient(135deg,#4f8ef7,#7b5ea7);border:none;border-radius:8px;color:white;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s}
    .save-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(79,142,247,0.4)}
    .saved-msg{display:none;font-size:11px;color:var(--green);font-family:'DM Mono',monospace;margin-left:12px}
    .saved-msg.show{display:inline}
    .toggle-wrap{display:flex;align-items:center;justify-content:space-between}
    .toggle{position:relative;width:38px;height:20px}
    .toggle input{opacity:0;width:0;height:0}
    .slider{position:absolute;inset:0;background:rgba(255,255,255,0.1);border-radius:20px;cursor:pointer;transition:0.3s}
    .slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:white;border-radius:50%;transition:0.3s}
    input:checked + .slider{background:var(--blue)}
    input:checked + .slider::before{transform:translateX(18px)}
  </style>
</head>
<body>
<div class="container">
  <div class="page-title">⚙ Settings</div>
  <div class="page-sub">social guardian configuration</div>

  <div class="card">
    <h2>Backend</h2>
    <div class="field">
      <label>Flask Server URL</label>
      <input type="text" id="backend-url" placeholder="http://localhost:5000"/>
    </div>
  </div>

  <div class="card">
    <h2>Detection Thresholds</h2>
    <div class="field">
      <label>Toxic threshold: <span class="threshold-val" id="tox-val">0.85</span></label>
      <input type="range" id="tox-threshold" min="0.50" max="0.99" step="0.01" value="0.85"/>
    </div>
    <div class="field">
      <label>Moderate threshold: <span class="threshold-val" id="mod-val">0.60</span></label>
      <input type="range" id="mod-threshold" min="0.30" max="0.85" step="0.01" value="0.60"/>
    </div>
  </div>

  <div class="card">
    <h2>Behaviour</h2>
    <div class="field">
      <div class="toggle-wrap">
        <label>Auto-scan on page load</label>
        <label class="toggle"><input type="checkbox" id="auto-scan" checked/><span class="slider"></span></label>
      </div>
    </div>
    <div class="field">
      <div class="toggle-wrap">
        <label>Highlight toxic comments on page</label>
        <label class="toggle"><input type="checkbox" id="highlight" checked/><span class="slider"></span></label>
      </div>
    </div>
  </div>

  <button class="save-btn" id="save-btn">Save Settings</button>
  <span class="saved-msg" id="saved-msg">✓ saved</span>
</div>
<script src="settings.js"></script>
</body>
</html>
